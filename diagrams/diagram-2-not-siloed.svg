<text x="40.0" y="62.1" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="26" fill="#1e1e1e" text-anchor="start">Claude alone is good. Claude connected is powerful.</text>
