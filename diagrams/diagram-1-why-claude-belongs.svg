<text x="40.0" y="65.5" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="30" fill="#1e1e1e" text-anchor="start">Every project deserves a Claude built in</text>
<text x="40.0" y="105.3" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="18" fill="#757575" text-anchor="start">Not just for engineers — for any initiative in the company</text>
<text x="40.0" y="847.0" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="20" fill="#1e1e1e" text-anchor="start">If Claude isn't part of the project, the project is</text>
<text x="40.0" y="872.6" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="20" fill="#1e1e1e" text-anchor="start">working harder than it needs to.</text>
