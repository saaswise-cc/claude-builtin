<rect x="60.0" y="320.0" width="380.0" height="100.0" rx="12" ry="12" fill="transparent" stroke="#a0a0a0" stroke-width="1.5" stroke-dasharray="8,6"/>
<text x="250.0" y="359.8" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle" dominant-baseline="middle">Filtered views</text>
<text x="250.0" y="380.2" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle" dominant-baseline="middle">a few hundred rows</text>
<rect x="480.0" y="320.0" width="380.0" height="100.0" rx="12" ry="12" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="670.0" y="359.8" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="16" fill="#8b5cf6" text-anchor="middle" dominant-baseline="middle">Real SQL queries</text>
<text x="670.0" y="380.2" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="16" fill="#8b5cf6" text-anchor="middle" dominant-baseline="middle">joins, aggregates, real scale</text>
<rect x="60.0" y="430.0" width="380.0" height="100.0" rx="12" ry="12" fill="transparent" stroke="#a0a0a0" stroke-width="1.5" stroke-dasharray="8,6"/>
<text x="250.0" y="469.8" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="16" fill="#a0a0a0" text-anchor="middle" dominant-baseline="middle">Block-based API</text>
