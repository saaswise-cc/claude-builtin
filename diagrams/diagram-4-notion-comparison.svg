<text x="670.0" y="580.4" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="15" fill="#8b5cf6" text-anchor="middle" dominant-baseline="middle">Claude operates all three automatically</text>
<text x="670.0" y="599.6" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="15" fill="#8b5cf6" text-anchor="middle" dominant-baseline="middle">the integration is the actual product</text>
<rect x="60.0" y="670.0" width="800.0" height="100.0" rx="12" ry="12" fill="#fff3bf" stroke="#92722a" stroke-width="1.5"/>
<text x="460.0" y="708.5" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="18" fill="#92722a" text-anchor="middle" dominant-baseline="middle">If the project is simple and short-lived, Notion is still the right call.</text>
<text x="460.0" y="731.5" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="18" fill="#92722a" text-anchor="middle" dominant-baseline="middle">This is for work that recurs and accumulates decisions over time.</text>
<text x="40.0" y="62.1" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="26" fill="#1e1e1e" text-anchor="start">When does this actually beat Notion?</text>
<text x="40.0" y="97.3" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="18" fill="#757575" text-anchor="start">Three things Notion can't do that this setup can</text>
</svg>