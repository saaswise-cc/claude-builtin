<rect x="480.0" y="210.0" width="380.0" height="100.0" rx="12" ry="12" fill="#d0bfff" stroke="#8b5cf6" stroke-width="1.5"/>
<text x="670.0" y="249.8" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="16" fill="#8b5cf6" text-anchor="middle" dominant-baseline="middle">Real git history</text>
