<rect x="60.0" y="540.0" width="380.0" height="100.0" rx="12" ry="12" fill="transparent" stroke="#a0a0a0" stroke-width="1.5" stroke-dasharray="8,6"/>
<text x="250.0" y="570.8" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="15" fill="#a0a0a0" text-anchor="middle" dominant-baseline="middle">Notion + GitHub + Airtable</text>
