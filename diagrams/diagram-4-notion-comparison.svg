<text x="670.0" y="469.8" font-family="Excalifont, 'Comic Sans MS', 'Segoe Print', cursive, sans-serif" font-size="16" fill="#8b5cf6" text-anchor="middle" dominant-baseline="middle">Structured APIs</text>
